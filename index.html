<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="description" content="Frigates Resume/CV Creator — Build a modern professional CV in minutes. Free instant PDF download."/>
  <meta property="og:title" content="Frigates CV Creator"/>
  <meta property="og:description" content="Build a modern two-column professional CV and download as PDF instantly."/>
  <title>Frigates CV Creator | Modern Professional Resume Builder</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Manrope:wght@700;800&display=swap" rel="stylesheet"/>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
  <style>
/* ─── DESIGN TOKENS ─────────────────────────────── */
:root{
  --navy:#1a2e4a; --navy2:#243754; --navy3:#1e3a5f;
  --teal:#0ea5e9; --teal2:#38bdf8;
  --bg:#f1f5f9; --card:#ffffff;
  --border:#e2e8f0; --border2:#cbd5e1;
  --text:#0f172a; --muted:#64748b; --muted2:#94a3b8;
  --danger:#ef4444; --dangerl:#fef2f2;
  --success:#10b981;
  --gold:#c9a84c;
  --sh:0 1px 3px rgba(0,0,0,.08),0 1px 2px rgba(0,0,0,.05);
  --sh-md:0 4px 12px rgba(0,0,0,.1);
  --sh-lg:0 20px 50px rgba(0,0,0,.15);
  --r:10px; --rl:16px;
  --font:'Inter',system-ui,sans-serif;
  --display:'Manrope',system-ui,sans-serif;
}

/* ─── RESET ─────────────────────────────────────── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{background:var(--bg);color:var(--text);font-family:var(--font);min-height:100vh;-webkit-font-smoothing:antialiased;}

/* ─── TOPBAR ─────────────────────────────────────── */
.topbar{background:var(--navy);height:56px;display:flex;align-items:center;padding:0 24px;gap:12px;box-shadow:0 2px 8px rgba(0,0,0,.2);position:sticky;top:0;z-index:200;}
.tb-logo{width:32px;height:32px;background:var(--teal);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;box-shadow:0 0 12px rgba(14,165,233,.35);}
.tb-brand{font-family:var(--display);font-size:16px;font-weight:800;color:#fff;letter-spacing:-.01em;}
.tb-brand span{color:var(--teal2);}
.tb-sep{width:1px;height:22px;background:rgba(255,255,255,.15);}
.tb-sub{font-size:12.5px;color:rgba(255,255,255,.5);font-weight:500;}

/* ─── LAYOUT ─────────────────────────────────────── */
.shell{max-width:1240px;margin:0 auto;padding:22px 20px 60px;display:grid;grid-template-columns:340px 1fr;gap:22px;align-items:start;}
@media(max-width:900px){.shell{grid-template-columns:1fr;}}

/* ─── FORM PANEL ─────────────────────────────────── */
.form-panel{background:var(--card);border:1px solid var(--border);border-radius:var(--rl);overflow:hidden;box-shadow:var(--sh);position:sticky;top:76px;}
@media(max-width:900px){.form-panel{position:static;}}

/* progress */
.prog-wrap{height:3px;background:var(--border);}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--navy),var(--teal));transition:width .4s ease;width:25%;}

/* tabs */
.steps-nav{display:flex;border-bottom:1px solid var(--border);overflow-x:auto;scrollbar-width:none;}
.steps-nav::-webkit-scrollbar{display:none;}
.step-btn{flex:1;min-width:56px;padding:12px 6px;background:none;border:none;border-bottom:2px solid transparent;cursor:pointer;font-family:var(--font);font-size:10px;font-weight:700;letter-spacing:.09em;text-transform:uppercase;color:var(--muted);transition:all .2s;}
.step-btn:hover{color:var(--text);background:#f8fafc;}
.step-btn.active{color:var(--navy);border-bottom-color:var(--teal);background:#f0f9ff;}
.step-btn .num{display:block;font-family:var(--display);font-size:14px;font-weight:800;margin-bottom:2px;color:var(--navy);}
.step-btn.active .num{color:var(--teal);}

/* form body */
.form-body{padding:20px;}
.step-panel{display:none;animation:fadeIn .25s ease;}
.step-panel.active{display:block;}
.sec-title{font-family:var(--display);font-size:16px;font-weight:800;color:var(--navy);margin-bottom:16px;padding-bottom:10px;border-bottom:2px solid var(--border);}

/* fields */
.field{margin-bottom:12px;}
label{display:block;font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:5px;}
input,textarea,select{width:100%;background:#f8fafc;border:1.5px solid var(--border2);border-radius:8px;padding:9px 11px;color:var(--text);font-family:var(--font);font-size:13.5px;outline:none;transition:border-color .2s,box-shadow .2s;resize:vertical;appearance:none;}
input:focus,textarea:focus,select:focus{border-color:var(--teal);box-shadow:0 0 0 3px rgba(14,165,233,.12);}
input::placeholder,textarea::placeholder{color:var(--muted2);}
input.invalid,textarea.invalid{border-color:var(--danger)!important;box-shadow:0 0 0 3px rgba(239,68,68,.1)!important;}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:11px;}
@media(max-width:440px){.row2{grid-template-columns:1fr;}}

/* theme selector */
.theme-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin-top:6px;}
.theme-dot{width:100%;aspect-ratio:1;border-radius:8px;border:2px solid transparent;cursor:pointer;transition:all .2s;position:relative;}
.theme-dot.active{border-color:var(--text);transform:scale(1.1);}
.theme-dot.active::after{content:'✓';position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;color:#fff;text-shadow:0 1px 2px rgba(0,0,0,.5);}

/* entry cards */
.entry-card{background:#f8fafc;border:1px solid var(--border);border-radius:var(--r);padding:14px;margin-bottom:10px;animation:fadeIn .2s ease;}
.entry-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:11px;}
.entry-lbl{font-size:11px;font-weight:700;color:var(--navy);letter-spacing:.05em;display:flex;align-items:center;gap:6px;}
.entry-lbl::before{content:'';width:6px;height:6px;border-radius:50%;background:var(--teal);flex-shrink:0;}
.btn-rm{background:none;border:none;color:var(--danger);cursor:pointer;font-size:11.5px;font-family:var(--font);font-weight:600;padding:3px 8px;border-radius:5px;transition:background .15s;}
.btn-rm:hover{background:var(--dangerl);}
.btn-add{width:100%;padding:10px;background:none;border:1.5px dashed var(--border2);border-radius:8px;color:var(--muted);cursor:pointer;font-family:var(--font);font-size:12.5px;font-weight:600;transition:all .2s;margin-top:4px;display:flex;align-items:center;justify-content:center;gap:6px;}
.btn-add:hover{border-color:var(--teal);color:var(--navy);background:#f0f9ff;}

/* nav */
.form-nav{display:flex;gap:9px;padding:14px 20px;border-top:1px solid var(--border);}
.btn{padding:10px 18px;border-radius:8px;font-family:var(--font);font-size:13px;font-weight:700;cursor:pointer;transition:all .2s;border:none;line-height:1;}
.btn-ghost{background:none;border:1.5px solid var(--border2);color:var(--muted);}
.btn-ghost:hover:not(:disabled){color:var(--text);background:#f1f5f9;}
.btn-ghost:disabled{opacity:.35;cursor:not-allowed;}
.btn-next{background:var(--navy);color:#fff;box-shadow:0 3px 10px rgba(26,46,74,.25);}
.btn-next:hover{background:var(--navy3);transform:translateY(-1px);}
.btn-gen{flex:1;background:linear-gradient(135deg,var(--navy),var(--teal));color:#fff;font-weight:800;box-shadow:0 4px 14px rgba(14,165,233,.3);}
.btn-gen:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(14,165,233,.4);}
.val-err{margin:0 20px 12px;padding:9px 13px;background:var(--dangerl);border:1px solid #fca5a5;border-radius:8px;color:#dc2626;font-size:12.5px;font-weight:600;display:none;}

/* ─── PREVIEW PANEL ──────────────────────────────── */
.preview-panel{}
.preview-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;flex-wrap:wrap;gap:10px;}
.preview-title{font-family:var(--display);font-size:16px;font-weight:800;color:var(--muted);}
.preview-title span{color:var(--navy);}
.preview-actions{display:flex;gap:8px;}
.btn-rebuild{padding:8px 14px;background:none;border:1.5px solid var(--border2);border-radius:8px;color:var(--muted);cursor:pointer;font-family:var(--font);font-size:12px;font-weight:700;transition:all .2s;display:none;}
.btn-rebuild:hover{border-color:var(--navy);color:var(--navy);}
.btn-pdf{padding:9px 18px;background:linear-gradient(135deg,var(--navy),var(--navy3));border:none;border-radius:8px;color:#fff;cursor:pointer;font-family:var(--font);font-size:13px;font-weight:800;display:flex;align-items:center;gap:7px;box-shadow:0 4px 12px rgba(26,46,74,.3);transition:all .2s;}
.btn-pdf:hover:not(:disabled){transform:translateY(-1px);box-shadow:0 6px 18px rgba(26,46,74,.4);}
.btn-pdf:disabled{opacity:.6;cursor:not-allowed;transform:none;}
.pdf-spin{width:13px;height:13px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;display:none;}

/* resume paper */
.resume-paper{background:#fff;border-radius:var(--rl);overflow:hidden;box-shadow:var(--sh-lg);min-height:500px;}
.state-empty{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:460px;color:var(--muted);text-align:center;padding:40px;}
.state-empty .ico{font-size:48px;margin-bottom:14px;opacity:.3;}
.state-empty p{font-size:14px;line-height:1.65;max-width:220px;}
.state-empty strong{color:var(--navy);}
.state-loading{display:none;flex-direction:column;align-items:center;justify-content:center;min-height:460px;gap:14px;}
.state-loading.show{display:flex;}
.loader{width:40px;height:40px;border:3px solid var(--border);border-top-color:var(--teal);border-radius:50%;animation:spin .8s linear infinite;}
.loader-text{color:var(--muted);font-size:13.5px;}

/* ─── MODERN CV OUTPUT ───────────────────────────── */
/* Two-column: coloured sidebar + white main */
#resume-out{display:none;}

.cv-wrap{display:flex;min-height:100%;font-family:'Inter',Arial,sans-serif;font-size:13px;line-height:1.6;color:#1a1a2e;-webkit-print-color-adjust:exact;print-color-adjust:exact;}

/* SIDEBAR */
.cv-sidebar{width:195px;flex-shrink:0;padding:32px 20px;background:var(--cv-primary,#1a2e4a);color:#fff;display:flex;flex-direction:column;gap:0;}

.cv-avatar{width:80px;height:80px;border-radius:50%;background:rgba(255,255,255,.15);border:3px solid rgba(255,255,255,.3);display:flex;align-items:center;justify-content:center;font-size:28px;font-weight:800;margin:0 auto 20px;color:#fff;letter-spacing:-.02em;flex-shrink:0;}

.cv-sb-name{font-size:14px;font-weight:800;text-align:center;margin-bottom:4px;line-height:1.2;color:#fff;}
.cv-sb-title{font-size:11px;font-weight:500;text-align:center;color:rgba(255,255,255,.65);margin-bottom:22px;line-height:1.4;}

.cv-sb-section{margin-bottom:20px;}
.cv-sb-heading{font-size:9px;font-weight:800;letter-spacing:.18em;text-transform:uppercase;color:rgba(255,255,255,.45);margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid rgba(255,255,255,.12);}

/* Contact items */
.cv-contact-item{display:flex;align-items:flex-start;gap:8px;margin-bottom:8px;font-size:11px;color:rgba(255,255,255,.8);word-break:break-word;}
.cv-contact-icon{width:16px;height:16px;border-radius:4px;background:rgba(255,255,255,.15);display:flex;align-items:center;justify-content:center;font-size:9px;flex-shrink:0;margin-top:1px;}

/* Skill bars */
.cv-skill-item{margin-bottom:8px;}
.cv-skill-name{font-size:11px;color:rgba(255,255,255,.85);margin-bottom:3px;font-weight:500;}
.cv-skill-bar{height:4px;background:rgba(255,255,255,.15);border-radius:100px;overflow:hidden;}
.cv-skill-fill{height:100%;border-radius:100px;background:rgba(255,255,255,.7);}

/* Language dots */
.cv-lang-item{display:flex;align-items:center;justify-content:space-between;margin-bottom:7px;}
.cv-lang-name{font-size:11px;color:rgba(255,255,255,.85);}
.cv-lang-level{font-size:10px;color:rgba(255,255,255,.5);}

/* Cert / interest chips in sidebar */
.cv-chip-wrap{display:flex;flex-wrap:wrap;gap:5px;}
.cv-chip{background:rgba(255,255,255,.12);border-radius:4px;padding:3px 8px;font-size:10px;color:rgba(255,255,255,.8);font-weight:500;}

/* MAIN CONTENT */
.cv-main{flex:1;padding:32px 30px;background:#fff;}

/* Header */
.cv-header{margin-bottom:22px;padding-bottom:16px;border-bottom:2px solid #e8e8e8;}
.cv-name{font-size:26px;font-weight:800;color:#0f172a;letter-spacing:-.02em;line-height:1.1;margin-bottom:4px;}
.cv-job-title{font-size:13px;font-weight:600;color:var(--cv-primary,#1a2e4a);margin-bottom:0;letter-spacing:.01em;}

/* Section */
.cv-section{margin-bottom:20px;}
.cv-section-title{font-size:10px;font-weight:800;letter-spacing:.16em;text-transform:uppercase;color:var(--cv-primary,#1a2e4a);margin-bottom:12px;display:flex;align-items:center;gap:10px;}
.cv-section-title::after{content:'';flex:1;height:2px;background:var(--cv-primary,#1a2e4a);opacity:.15;}

/* Summary */
.cv-summary{font-size:13px;color:#374151;line-height:1.75;}

/* Experience item */
.cv-exp-item{margin-bottom:16px;padding-left:14px;border-left:3px solid var(--cv-primary,#1a2e4a);position:relative;}
.cv-exp-item::before{content:'';position:absolute;left:-5px;top:4px;width:8px;height:8px;border-radius:50%;background:var(--cv-primary,#1a2e4a);}
.cv-exp-header{display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:4px;margin-bottom:2px;}
.cv-exp-role{font-size:13.5px;font-weight:700;color:#0f172a;}
.cv-exp-date{font-size:11px;font-weight:600;color:var(--cv-primary,#1a2e4a);background:rgba(26,46,74,.07);padding:2px 8px;border-radius:100px;white-space:nowrap;}
.cv-exp-company{font-size:12px;font-weight:600;color:#6b7280;margin-bottom:5px;}
.cv-exp-desc{font-size:12.5px;color:#4b5563;line-height:1.65;}

/* Education item */
.cv-edu-item{margin-bottom:12px;display:flex;gap:12px;align-items:flex-start;}
.cv-edu-dot{width:10px;height:10px;border-radius:50%;background:var(--cv-primary,#1a2e4a);flex-shrink:0;margin-top:3px;opacity:.6;}
.cv-edu-degree{font-size:13px;font-weight:700;color:#0f172a;}
.cv-edu-school{font-size:12px;color:#6b7280;margin-top:1px;}
.cv-edu-year{font-size:11px;font-weight:600;color:var(--cv-primary,#1a2e4a);margin-top:2px;}

/* Skills in main (tags) */
.cv-skill-tags{display:flex;flex-wrap:wrap;gap:6px;}
.cv-skill-tag{background:#f1f5f9;color:#374151;border:1px solid #e2e8f0;border-radius:5px;padding:4px 11px;font-size:11.5px;font-weight:600;}

/* ─── TOAST ──────────────────────────────────────── */
#toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(90px);background:#0f172a;color:#fff;padding:11px 22px;border-radius:100px;font-size:13px;font-weight:600;box-shadow:0 8px 30px rgba(0,0,0,.25);z-index:9999;transition:transform .35s cubic-bezier(.34,1.56,.64,1);pointer-events:none;white-space:nowrap;}
#toast.show{transform:translateX(-50%) translateY(0);}

/* ─── PAGE FOOTER ────────────────────────────────── */
footer{text-align:center;padding:0 20px 28px;color:var(--muted2);font-size:12px;}

/* ─── KEYFRAMES ──────────────────────────────────── */
@keyframes spin{to{transform:rotate(360deg);}}
@keyframes fadeIn{from{opacity:0;}to{opacity:1;}}

/* ─── PRINT ──────────────────────────────────────── */
@media print{
  .topbar,.form-panel,.preview-hdr,footer,#toast{display:none!important;}
  .shell{display:block!important;padding:0!important;max-width:100%!important;}
  .resume-paper{box-shadow:none!important;border-radius:0!important;}
  .state-empty,.state-loading{display:none!important;}
}
  </style>
</head>
<body>

<!-- TOPBAR -->
<div class="topbar">
  <div class="tb-logo">&#9875;</div>
  <div class="tb-brand">Frigates <span>CV</span></div>
  <div class="tb-sep"></div>
  <div class="tb-sub">Professional Resume Builder</div>
</div>

<div class="shell">

  <!-- ═══ FORM PANEL ═══ -->
  <div class="form-panel">
    <div class="prog-wrap"><div class="prog-fill" id="prog-fill"></div></div>

    <div class="steps-nav" role="tablist">
      <button class="step-btn active" type="button" role="tab" aria-selected="true"  onclick="goStep(0)"><span class="num">01</span>Personal</button>
      <button class="step-btn"        type="button" role="tab" aria-selected="false" onclick="goStep(1)"><span class="num">02</span>Work</button>
      <button class="step-btn"        type="button" role="tab" aria-selected="false" onclick="goStep(2)"><span class="num">03</span>Education</button>
      <button class="step-btn"        type="button" role="tab" aria-selected="false" onclick="goStep(3)"><span class="num">04</span>Skills</button>
    </div>

    <div class="form-body">

      <!-- Step 0: Personal -->
      <div class="step-panel active" id="step-0" role="tabpanel">
        <div class="sec-title">Personal Details</div>

        <div class="field">
          <label for="f-name">Full Name <span style="color:var(--danger);text-transform:none;letter-spacing:0;">*required</span></label>
          <input type="text" id="f-name" placeholder="Jane Doe" autocomplete="name"/>
        </div>
        <div class="field">
          <label for="f-title">Job Title / Headline</label>
          <input type="text" id="f-title" placeholder="Senior Software Engineer"/>
        </div>
        <div class="row2">
          <div class="field">
            <label for="f-email">Email</label>
            <input type="email" id="f-email" placeholder="jane@email.com" autocomplete="email"/>
          </div>
          <div class="field">
            <label for="f-phone">Phone</label>
            <input type="tel" id="f-phone" placeholder="+1 555 000 0000" autocomplete="tel"/>
          </div>
        </div>
        <div class="row2">
          <div class="field">
            <label for="f-location">Location</label>
            <input type="text" id="f-location" placeholder="New York, NY"/>
          </div>
          <div class="field">
            <label for="f-linkedin">LinkedIn</label>
            <input type="text" id="f-linkedin" placeholder="linkedin.com/in/jane"/>
          </div>
        </div>
        <div class="field">
          <label for="f-website">Website / Portfolio</label>
          <input type="text" id="f-website" placeholder="janedoe.dev"/>
        </div>
        <div class="field">
          <label for="f-summary">Professional Summary</label>
          <textarea id="f-summary" rows="4" placeholder="Brief intro — your expertise, background and career goals..."></textarea>
        </div>

        <!-- CV colour theme picker -->
        <div class="field">
          <label>CV Colour Theme</label>
          <div class="theme-grid" id="theme-grid">
            <div class="theme-dot active" data-color="#1a2e4a" style="background:#1a2e4a;" onclick="setTheme(this)" title="Navy"></div>
            <div class="theme-dot" data-color="#1e3a5f" style="background:#1e3a5f;" onclick="setTheme(this)" title="Dark Blue"></div>
            <div class="theme-dot" data-color="#0f766e" style="background:#0f766e;" onclick="setTheme(this)" title="Teal"></div>
            <div class="theme-dot" data-color="#7c3aed" style="background:#7c3aed;" onclick="setTheme(this)" title="Purple"></div>
            <div class="theme-dot" data-color="#b45309" style="background:#b45309;" onclick="setTheme(this)" title="Amber"></div>
            <div class="theme-dot" data-color="#be123c" style="background:#be123c;" onclick="setTheme(this)" title="Red"></div>
            <div class="theme-dot" data-color="#166534" style="background:#166534;" onclick="setTheme(this)" title="Green"></div>
            <div class="theme-dot" data-color="#374151" style="background:#374151;" onclick="setTheme(this)" title="Slate"></div>
            <div class="theme-dot" data-color="#9d174d" style="background:#9d174d;" onclick="setTheme(this)" title="Rose"></div>
            <div class="theme-dot" data-color="#1e40af" style="background:#1e40af;" onclick="setTheme(this)" title="Royal Blue"></div>
          </div>
        </div>
      </div>

      <!-- Step 1: Work Experience -->
      <div class="step-panel" id="step-1" role="tabpanel">
        <div class="sec-title">Work Experience</div>
        <div id="exp-list"></div>
        <button class="btn-add" type="button" onclick="addExp()">
          <span>&#43;</span> Add Experience
        </button>
      </div>

      <!-- Step 2: Education -->
      <div class="step-panel" id="step-2" role="tabpanel">
        <div class="sec-title">Education</div>
        <div id="edu-list"></div>
        <button class="btn-add" type="button" onclick="addEdu()">
          <span>&#43;</span> Add Education
        </button>
      </div>

      <!-- Step 3: Skills & More -->
      <div class="step-panel" id="step-3" role="tabpanel">
        <div class="sec-title">Skills &amp; More</div>
        <div class="field">
          <label for="f-skills">Key Skills <span style="text-transform:none;font-size:10px;font-weight:400;">(comma separated)</span></label>
          <textarea id="f-skills" rows="3" placeholder="JavaScript, React, Python, Leadership, Agile..."></textarea>
        </div>
        <div class="field">
          <label for="f-lang">Languages</label>
          <input type="text" id="f-lang" placeholder="English (Native), French (B2)"/>
        </div>
        <div class="field">
          <label for="f-certs">Certifications</label>
          <input type="text" id="f-certs" placeholder="AWS Certified, PMP, CPA..."/>
        </div>
        <div class="field">
          <label for="f-interests">Interests</label>
          <input type="text" id="f-interests" placeholder="Open Source, Photography, Chess..."/>
        </div>
      </div>

    </div><!-- /form-body -->

    <div class="val-err" id="val-err"></div>

    <div class="form-nav">
      <button class="btn btn-ghost" type="button" id="btn-back" onclick="prevStep()" disabled>&#8592; Back</button>
      <button class="btn btn-next"  type="button" id="btn-next" onclick="nextStep()">Next &#8594;</button>
      <button class="btn btn-gen"   type="button" id="btn-gen"  onclick="buildCV()" style="display:none;">&#128196; Build CV</button>
    </div>
  </div><!-- /form-panel -->

  <!-- ═══ PREVIEW PANEL ═══ -->
  <div class="preview-panel">
    <div class="preview-hdr">
      <div class="preview-title">CV <span>Preview</span></div>
      <div class="preview-actions">
        <button class="btn-rebuild" type="button" id="btn-rebuild" onclick="buildCV()">&#8635; Rebuild</button>
        <button class="btn-pdf"     type="button" id="btn-pdf"     onclick="savePDF()">
          <span class="pdf-spin" id="pdf-spin"></span>
          <span id="pdf-label">&#128196; Download PDF</span>
        </button>
      </div>
    </div>

    <div class="resume-paper">
      <div class="state-empty" id="state-empty">
        <div class="ico">&#128196;</div>
        <p>Complete all 4 steps then click <strong>Build CV</strong> to preview your modern resume.</p>
      </div>
      <div class="state-loading" id="state-loading">
        <div class="loader"></div>
        <div class="loader-text">Building your CV&hellip;</div>
      </div>
      <div id="resume-out"></div>
    </div>
  </div>

</div><!-- /shell -->

<footer>&#9875; Frigates CV Creator &mdash; Free professional resume builder</footer>
<div id="toast"></div>

<script>
'use strict';

/* ─── CONFIG ─────────────────────────────────────── */
var CVTheme = '#1a2e4a';   /* selected sidebar colour */

/* ─── STATE ──────────────────────────────────────── */
var step = 0;
var expIdx = 0;
var eduIdx = 0;
var toastTmr = null;

/* ─── BOOT ───────────────────────────────────────── */
document.addEventListener('DOMContentLoaded', function () {
  addExp();
  addEdu();
  document.addEventListener('keydown', function (e) {
    if (e.key !== 'Enter') return;
    var tag = document.activeElement ? document.activeElement.tagName : '';
    if (tag === 'TEXTAREA' || tag === 'SELECT') return;
    if (step < 3) nextStep();
    else buildCV();
  });
});

/* ─── THEME ──────────────────────────────────────── */
function setTheme(el) {
  document.querySelectorAll('.theme-dot').forEach(function (d) { d.classList.remove('active'); });
  el.classList.add('active');
  CVTheme = el.getAttribute('data-color') || '#1a2e4a';
}

/* ─── STEP NAV ───────────────────────────────────── */
function goStep(n) {
  var panels  = document.querySelectorAll('.step-panel');
  var tabs    = document.querySelectorAll('.step-btn');
  for (var i = 0; i < 4; i++) {
    panels[i].classList.toggle('active', i === n);
    tabs[i].classList.toggle('active', i === n);
    tabs[i].setAttribute('aria-selected', i === n ? 'true' : 'false');
  }
  step = n;
  document.getElementById('prog-fill').style.width = ((n + 1) * 25) + '%';
  document.getElementById('btn-back').disabled = (n === 0);
  document.getElementById('btn-next').style.display = (n === 3) ? 'none' : '';
  document.getElementById('btn-gen').style.display  = (n === 3) ? ''     : 'none';
}

function nextStep() {
  if (step === 0) {
    var nm = document.getElementById('f-name');
    if (!nm || !nm.value.trim()) {
      nm.classList.add('invalid');
      showValErr('Full name is required to continue.');
      nm.focus();
      setTimeout(function () { nm.classList.remove('invalid'); }, 2500);
      return;
    }
  }
  if (step < 3) goStep(step + 1);
}

function prevStep() { if (step > 0) goStep(step - 1); }

/* ─── ADD ENTRIES ────────────────────────────────── */
function addExp() {
  expIdx++;
  var id = expIdx;
  var el = document.createElement('div');
  el.className = 'entry-card';
  el.id = 'exp-' + id;
  el.innerHTML =
    '<div class="entry-hdr">' +
      '<span class="entry-lbl">Experience #' + id + '</span>' +
      '<button class="btn-rm" type="button" onclick="rmEl(\'exp-' + id + '\')">&#10005; Remove</button>' +
    '</div>' +
    '<div class="field"><label>Job Title</label>' +
      '<input type="text" id="er-' + id + '" placeholder="Software Engineer"/></div>' +
    '<div class="field"><label>Company</label>' +
      '<input type="text" id="ec-' + id + '" placeholder="Acme Corporation"/></div>' +
    '<div class="field"><label>Duration</label>' +
      '<input type="text" id="ed-' + id + '" placeholder="Jan 2021 \u2013 Present"/></div>' +
    '<div class="field"><label>Key Achievements &amp; Responsibilities</label>' +
      '<textarea id="edesc-' + id + '" rows="3" placeholder="Increased sales by 30% through... Led a team of 8 engineers..."></textarea></div>';
  document.getElementById('exp-list').appendChild(el);
}

function addEdu() {
  eduIdx++;
  var id = eduIdx;
  var el = document.createElement('div');
  el.className = 'entry-card';
  el.id = 'edu-' + id;
  el.innerHTML =
    '<div class="entry-hdr">' +
      '<span class="entry-lbl">Education #' + id + '</span>' +
      '<button class="btn-rm" type="button" onclick="rmEl(\'edu-' + id + '\')">&#10005; Remove</button>' +
    '</div>' +
    '<div class="field"><label>School / University</label>' +
      '<input type="text" id="es-' + id + '" placeholder="Harvard University"/></div>' +
    '<div class="field"><label>Degree &amp; Field</label>' +
      '<input type="text" id="edg-' + id + '" placeholder="B.Sc. Computer Science"/></div>' +
    '<div class="field"><label>Graduation Year</label>' +
      '<input type="text" id="ey-' + id + '" placeholder="2020"/></div>';
  document.getElementById('edu-list').appendChild(el);
}

function rmEl(id) {
  var el = document.getElementById(id);
  if (el && el.parentNode) { el.parentNode.removeChild(el); }
}

/* ─── COLLECT ────────────────────────────────────── */
function gv(id) { var el = document.getElementById(id); return el ? el.value.trim() : ''; }

function collect() {
  var exp = [];
  var cards = document.querySelectorAll('#exp-list .entry-card');
  for (var i = 0; i < cards.length; i++) {
    var cid = cards[i].id.replace('exp-', '');
    var role = gv('er-' + cid), co = gv('ec-' + cid);
    if (role || co) {
      exp.push({ role: role, company: co, duration: gv('ed-' + cid), desc: gv('edesc-' + cid) });
    }
  }
  var edu = [];
  var ecards = document.querySelectorAll('#edu-list .entry-card');
  for (var j = 0; j < ecards.length; j++) {
    var kid = ecards[j].id.replace('edu-', '');
    var sc = gv('es-' + kid), dg = gv('edg-' + kid);
    if (sc || dg) { edu.push({ school: sc, degree: dg, year: gv('ey-' + kid) }); }
  }
  return {
    name:    gv('f-name'),    title:  gv('f-title'),
    email:   gv('f-email'),   phone:  gv('f-phone'),
    loc:     gv('f-location'),link:   gv('f-linkedin'),
    site:    gv('f-website'), summary:gv('f-summary'),
    exp:     exp,             edu:    edu,
    skills:  gv('f-skills'),  lang:   gv('f-lang'),
    certs:   gv('f-certs'),   interests:gv('f-interests')
  };
}

/* ─── AUTO-FILL ──────────────────────────────────── */
function autoSum(text, name, title) {
  if (text) return text;
  if (!name && !title) return '';
  return (name || 'A results-driven professional') + ' is an accomplished ' +
    (title || 'professional') + ' with a strong track record of delivering measurable results. ' +
    'Committed to excellence and continuous professional development.';
}

function autoDesc(text, role, company) {
  if (text) return text;
  if (!role) return '';
  return 'Contributed as ' + role + (company ? ' at ' + company : '') +
    ', leading key initiatives and collaborating across teams to meet business objectives and drive continuous improvement.';
}

/* ─── XSS ESCAPE ─────────────────────────────────── */
function esc(s) {
  if (s === null || s === undefined) return '';
  return String(s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#x27;');
}

/* ─── BUILD ──────────────────────────────────────── */
function buildCV() {
  var d = collect();
  if (!d.name) {
    goStep(0);
    var nm = document.getElementById('f-name');
    if (nm) { nm.classList.add('invalid'); nm.focus(); setTimeout(function(){nm.classList.remove('invalid');},2500); }
    showValErr('Full name is required before building the CV.');
    return;
  }
  document.getElementById('state-empty').style.display = 'none';
  document.getElementById('state-loading').classList.add('show');
  document.getElementById('resume-out').style.display  = 'none';

  setTimeout(function () {
    var r = {
      name:    d.name,    title:   d.title,
      email:   d.email,   phone:   d.phone,
      loc:     d.loc,     link:    d.link,
      site:    d.site,
      summary: autoSum(d.summary, d.name, d.title),
      exp:     d.exp.map(function (e) {
        return { role:e.role, company:e.company, duration:e.duration,
                 desc: autoDesc(e.desc, e.role, e.company) };
      }),
      edu:       d.edu,
      skills:    d.skills,
      lang:      d.lang,
      certs:     d.certs,
      interests: d.interests
    };
    render(r);
    document.getElementById('btn-rebuild').style.display = '';
    showToast('&#9989; CV built — click Download PDF to save it.');
  }, 750);
}

/* ─── RENDER ─────────────────────────────────────── */
function render(r) {
  document.getElementById('state-loading').classList.remove('show');

  var initials = '';
  var parts = (r.name || '').trim().split(/\s+/);
  if (parts.length >= 2) initials = parts[0].charAt(0) + parts[parts.length-1].charAt(0);
  else if (parts[0]) initials = parts[0].charAt(0);
  initials = initials.toUpperCase();

  /* ── SIDEBAR ── */
  var contact = '';
  if (r.email) contact += sbItem('&#9993;', esc(r.email));
  if (r.phone) contact += sbItem('&#128222;', esc(r.phone));
  if (r.loc)   contact += sbItem('&#128205;', esc(r.loc));
  if (r.link)  contact += sbItem('&#128279;', esc(r.link));
  if (r.site)  contact += sbItem('&#127760;', esc(r.site));

  var skillHTML = '';
  if (r.skills) {
    var sarr = r.skills.split(',');
    for (var si = 0; si < sarr.length; si++) {
      var sk = sarr[si].trim();
      if (!sk) continue;
      /* bar width cycles nicely 95, 85, 90, 80, 88... */
      var w = 95 - ((si * 7) % 20);
      skillHTML += '<div class="cv-skill-item">' +
        '<div class="cv-skill-name">' + esc(sk) + '</div>' +
        '<div class="cv-skill-bar"><div class="cv-skill-fill" style="width:' + w + '%"></div></div>' +
        '</div>';
    }
  }

  var langHTML = '';
  if (r.lang) {
    var larr = r.lang.split(',');
    for (var li = 0; li < larr.length; li++) {
      var lp = larr[li].trim();
      if (!lp) continue;
      var lm = lp.match(/^(.+?)\s*\((.+?)\)$/);
      var lname = lm ? lm[1].trim() : lp;
      var llevel= lm ? lm[2].trim() : '';
      langHTML += '<div class="cv-lang-item">' +
        '<span class="cv-lang-name">' + esc(lname) + '</span>' +
        (llevel ? '<span class="cv-lang-level">' + esc(llevel) + '</span>' : '') +
        '</div>';
    }
  }

  var certChips = '';
  if (r.certs) {
    var carr = r.certs.split(',');
    for (var ci = 0; ci < carr.length; ci++) {
      var ct = carr[ci].trim();
      if (ct) certChips += '<span class="cv-chip">' + esc(ct) + '</span>';
    }
  }

  var intChips = '';
  if (r.interests) {
    var iarr = r.interests.split(',');
    for (var ii = 0; ii < iarr.length; ii++) {
      var it = iarr[ii].trim();
      if (it) intChips += '<span class="cv-chip">' + esc(it) + '</span>';
    }
  }

  /* ── MAIN CONTENT ── */
  var expHTML = '';
  for (var ei = 0; ei < r.exp.length; ei++) {
    var e = r.exp[ei];
    expHTML +=
      '<div class="cv-exp-item">' +
        '<div class="cv-exp-header">' +
          '<div class="cv-exp-role">' + esc(e.role) + '</div>' +
          (e.duration ? '<div class="cv-exp-date">' + esc(e.duration) + '</div>' : '') +
        '</div>' +
        '<div class="cv-exp-company">' + esc(e.company) + '</div>' +
        (e.desc ? '<div class="cv-exp-desc">' + esc(e.desc) + '</div>' : '') +
      '</div>';
  }

  var eduHTML = '';
  for (var edi = 0; edi < r.edu.length; edi++) {
    var ed = r.edu[edi];
    eduHTML +=
      '<div class="cv-edu-item">' +
        '<div class="cv-edu-dot"></div>' +
        '<div>' +
          '<div class="cv-edu-degree">' + esc(ed.degree) + '</div>' +
          '<div class="cv-edu-school">' + esc(ed.school) + '</div>' +
          (ed.year ? '<div class="cv-edu-year">' + esc(ed.year) + '</div>' : '') +
        '</div>' +
      '</div>';
  }

  /* skills as tags in main (if no sidebar skills section shown) */
  var mainSkillHTML = '';
  if (r.skills) {
    var msa = r.skills.split(',');
    for (var msi = 0; msi < msa.length; msi++) {
      var ms = msa[msi].trim();
      if (ms) mainSkillHTML += '<span class="cv-skill-tag">' + esc(ms) + '</span>';
    }
  }

  /* helper: sidebar section */
  function sbSec(title, content) {
    if (!content) return '';
    return '<div class="cv-sb-section">' +
      '<div class="cv-sb-heading">' + title + '</div>' +
      content +
      '</div>';
  }
  /* helper: main section */
  function mainSec(title, content) {
    if (!content) return '';
    return '<div class="cv-section">' +
      '<div class="cv-section-title" style="--cv-primary:' + CVTheme + '">' + title + '</div>' +
      content +
      '</div>';
  }

  /* Assemble */
  var html =
    '<div class="cv-wrap" style="--cv-primary:' + esc(CVTheme) + '">' +

      /* SIDEBAR */
      '<div class="cv-sidebar" style="background:' + esc(CVTheme) + '">' +
        '<div class="cv-avatar">' + esc(initials) + '</div>' +
        '<div class="cv-sb-name">'  + esc(r.name  || 'Your Name') + '</div>' +
        (r.title ? '<div class="cv-sb-title">' + esc(r.title) + '</div>' : '') +

        sbSec('Contact',   contact) +
        sbSec('Skills',    skillHTML) +
        sbSec('Languages', langHTML) +
        (certChips ? sbSec('Certifications', '<div class="cv-chip-wrap">' + certChips + '</div>') : '') +
        (intChips  ? sbSec('Interests', '<div class="cv-chip-wrap">' + intChips + '</div>') : '') +
      '</div>' +

      /* MAIN */
      '<div class="cv-main">' +
        '<div class="cv-header">' +
          '<div class="cv-name">' + esc(r.name || 'Your Name') + '</div>' +
          (r.title ? '<div class="cv-job-title" style="color:' + esc(CVTheme) + '">' + esc(r.title) + '</div>' : '') +
        '</div>' +

        mainSec('Professional Summary',
          r.summary ? '<div class="cv-summary">' + esc(r.summary) + '</div>' : '') +

        mainSec('Work Experience', expHTML) +
        mainSec('Education', eduHTML) +

        (mainSkillHTML ? mainSec('Core Skills',
          '<div class="cv-skill-tags">' + mainSkillHTML + '</div>') : '') +

      '</div>' + /* /cv-main */
    '</div>';   /* /cv-wrap */

  var out = document.getElementById('resume-out');
  out.innerHTML = html;
  out.style.display   = 'block';
  out.style.animation = 'fadeIn 0.4s ease';
}

/* ─── SIDEBAR ITEM ───────────────────────────────── */
function sbItem(icon, text) {
  return '<div class="cv-contact-item">' +
    '<div class="cv-contact-icon">' + icon + '</div>' +
    '<span>' + text + '</span>' +
    '</div>';
}

/* ─── SAVE PDF ───────────────────────────────────── */
function savePDF() {
  var out = document.getElementById('resume-out');
  if (!out || out.style.display === 'none' || !out.innerHTML.trim()) {
    showToast('&#9888; Build your CV first before downloading.');
    return;
  }

  var btn   = document.getElementById('btn-pdf');
  var spin  = document.getElementById('pdf-spin');
  var label = document.getElementById('pdf-label');

  btn.disabled        = true;
  spin.style.display  = 'inline-block';
  label.textContent   = 'Generating...';

  var name = gv('f-name') || 'CV';
  var filename = name.replace(/\s+/g, '-').replace(/[^A-Za-z0-9\-]/g, '') + '-CV.pdf';

  var opt = {
    margin:      0,
    filename:    filename,
    image:       { type: 'jpeg', quality: 0.98 },
    html2canvas: {
      scale:           2,
      useCORS:         true,
      letterRendering: true,
      backgroundColor: '#ffffff',
      logging:         false
    },
    jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' },
    pagebreak: { mode: ['avoid-all', 'css', 'legacy'] }
  };

  html2pdf().set(opt).from(out).save()
    .then(function () {
      btn.disabled        = false;
      spin.style.display  = 'none';
      label.innerHTML     = '&#128196; Download PDF';
      showToast('&#9989; PDF downloaded to your Downloads folder.');
    })
    .catch(function () {
      btn.disabled        = false;
      spin.style.display  = 'none';
      label.innerHTML     = '&#128196; Download PDF';
      showToast('&#9888; PDF failed. Please try again.');
    });
}

/* ─── HELPERS ────────────────────────────────────── */
function showToast(msg) {
  var t = document.getElementById('toast');
  t.innerHTML = msg;
  t.classList.add('show');
  if (toastTmr) clearTimeout(toastTmr);
  toastTmr = setTimeout(function () { t.classList.remove('show'); }, 3200);
}

function showValErr(msg) {
  var el = document.getElementById('val-err');
  el.innerHTML = '&#9888; ' + msg;
  el.style.display = 'block';
  setTimeout(function () { el.style.display = 'none'; }, 3500);
}
</script>
</body>
